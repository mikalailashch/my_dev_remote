name: Salesforce CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli@latest
          sf version

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SALESFORCE_AUTH_URL }}" > ./authfile
          sf org login sfdx-url --sfdx-url-file ./authfile --set-default --alias target-org
          rm ./authfile

      - name: Run Apex Tests
        run: |
          sf apex run test --target-org target-org --test-level RunLocalTests --code-coverage --result-format human --wait 10

      - name: Validate Deployment
        if: github.event_name == 'pull_request'
        run: |
          sf project deploy start --source-dir src --target-org target-org --test-level RunLocalTests --dry-run --wait 30

      - name: Deploy to Salesforce
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        run: |
          sf project deploy start --source-dir src --target-org target-org --test-level RunLocalTests --wait 30

      - name: Deployment Status
        if: always()
        run: |
          echo "Deployment completed with status: ${{ job.status }}"

